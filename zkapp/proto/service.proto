syntax = "proto3";

package trading;

// Service Definition
service TradingEngine {
  // 1. Place Order (Unary Call - Cepat & Sederhana)
  // Mengirim satu order, menunggu konfirmasi engine (bukan konfirmasi match, tapi konfirmasi diterima)
  rpc PlaceLimitOrder (PlaceOrderRequest) returns (PlaceOrderResponse);

  // 2. Cancel Order
  rpc CancelOrder (CancelOrderRequest) returns (CancelOrderResponse);

  // 3. Get Orderbook Depth 
  // Mengambil state pasar saat ini (Top N Bids/Asks)
  rpc GetOrderBookDepth (DepthRequest) returns (DepthResponse);

  // 4. Mempool Listener (Server-Side Streaming)
  // Solver memanggil RPC ini sekali, lalu Sequencer akan terus mengirimkan aliran (stream) intent baru.
  rpc SubscribeIntentMempool (MempoolSubscribeRequest) returns (stream IntentEvent);

  // 5. Order Flow Auction (OFA) Bidding
  // Solver mengirimkan tawaran (Bid) alih-alih langsung mengeksekusi.
  rpc SubmitIntentBid (IntentBidRequest) returns (IntentBidResponse);

  // 6. Execute Solver Bundle (Dibutuhkan oleh mock_sequencer.rs)
  rpc ExecuteSolverBundle (IntentBundle) returns (ExecutionReport);
}

// =============================================================
// Data Structures: Event-Driven & Intent Standard
// =============================================================

// Request dari Solver untuk mendengarkan Mempool
message MempoolSubscribeRequest {
  string solver_id = 1;
  // Opsional: Solver bisa memfilter intent di chain tertentu (misal khusus Optimism/Unichain)
  repeated uint32 interested_chain_ids = 2; 
}

// Event yang disiarkan Sequencer ke seluruh Solver
message IntentEvent {
  string event_id = 1;
  uint64 timestamp = 2;
  // Membawa detail intent standar
  CrossChainIntent intent = 3;
}

// Representasi Standar ERC-7683 (Cross-Chain Intent)
// Menggantikan InternalOrder/PlaceOrderRequest yang terlalu sederhana
message CrossChainIntent {
  string intent_id = 1;            // Hash unik dari intent
  string user_address = 2;         // Alamat EVM pengguna (0x...)
  
  uint32 source_chain_id = 3;      // Chain asal pengguna
  uint32 destination_chain_id = 4; // Chain tujuan penyelesaian (misal: L1 AppChain Anda)
  
  string input_token = 5;          // Alamat ERC20 token yang diberikan user
  uint64 input_amount = 6;         // Jumlah yang dikunci user
  string output_token = 7;         // Alamat ERC20 token yang diinginkan user
  uint64 min_output_amount = 8;    // Batas toleransi harga (Slippage protection)
  
  uint64 deadline = 9;             // Unix timestamp, jika lewat maka intent kadaluarsa
  bytes user_signature = 10;       // Tanda tangan kriptografis (EIP-712) untuk divalidasi oleh ZK-Prover
}

// Tawaran (Bid) dari Solver untuk menyelesaikan sebuah Intent
message IntentBidRequest {
  string solver_id = 1;
  string intent_id = 2;            // Merujuk ke intent mana yang ingin diselesaikan
  
  // Rute dan estimasi eksekusi dari Solver
  uint64 proposed_output_amount = 3; // Berapa yang berani diberikan Solver ke User? (Harus >= min_output_amount)
  uint64 estimated_gas_cost = 4;     // Estimasi gas untuk kalkulasi net profit di Sequencer
  
  bytes solver_signature = 5;      // Komitmen kriptografis solver
}

message IntentBidResponse {
  bool accepted = 1;               // Apakah bid masuk ke sistem lelang? (Belum tentu menang)
  string message = 2;
  string auction_id = 3;           // ID lelang untuk dilacak
}

// =============================================================
// Data Structures
// =============================================================

// Enum untuk Side (Jual/Beli)
enum Side {
  SIDE_UNSPECIFIED = 0; // Protobuf best practice: enum 0 selalu 'unknown'
  SIDE_BID = 1;         // Beli
  SIDE_ASK = 2;         // Jual
}

message IntentBundle {
  repeated PlaceOrderRequest orders = 1; // Order User + Order Solver
  string solver_id = 2;
  uint64 nonce = 3;
}

message ExecutionReport {
  bool success = 1;
  string message = 2;
  repeated TradeExecution fills = 3;
}

// Request untuk menaruh order
message PlaceOrderRequest {
  uint64 user_id = 1;
  uint64 order_id = 2;   // ID unik yang digenerate oleh Client/API Gateway (Idempotency key)
  Side side = 3;
  uint64 price = 4;      // Atomic units (Satoshi/Wei)
  uint64 quantity = 5;   // Atomic units
}

// Response dari engine
message PlaceOrderResponse {
  bool success = 1;
  string message = 2;    // "Order Accepted", "Insufficient Balance", etc.
  
  // Opsional: Langsung mengembalikan status jika terjadi instant match
  // (Tapi untuk performa ultra-tinggi, biasanya hasil match dikirim via stream terpisah)
  repeated TradeExecution fills = 3; 
}

message CancelOrderRequest {
  uint64 user_id = 1;
  uint64 order_id = 2;
}

message CancelOrderResponse {
  bool success = 1;
  uint64 remaining_qty = 2; // Sisa quantity yang dicancel
}

message DepthRequest {
  string symbol = 1; // e.g., "SOL_USDC" (Jika nanti support multi-pair)
  uint32 limit = 2;  // Berapa level kedalaman (e.g., Top 10)
}

message DepthResponse {
  repeated OrderLevel bids = 1;
  repeated OrderLevel asks = 2;
  uint64 sequence_id = 3; // Untuk memastikan klien menerima data urut
}

// Struktur helper
message OrderLevel {
  uint64 price = 1;
  uint64 total_quantity = 2; // Total volume di harga ini
}

message TradeExecution {
  uint64 maker_order_id = 1;
  uint64 price = 2;
  uint64 quantity = 3;
}